<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Rノート</title>

<style>
body{
    font-family: sans-serif;
    max-width:600px;
    margin:auto;
    padding:20px;
    background:#f5f5f5;
}

h1{
    text-align:center;
}

.card{
    background:white;
    padding:15px;
    margin-bottom:15px;
    border-radius:12px;
    box-shadow:0 2px 6px rgba(0,0,0,.1);
}

input,textarea{
    width:100%;
    box-sizing:border-box;
    padding:10px;
    margin-top:5px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

textarea{
    min-height:100px;
    resize:vertical;
}

button{
    width:100%;
    padding:15px;
    font-size:18px;
    border:none;
    border-radius:10px;
    background:#4CAF50;
    color:white;
}

button:active{
    transform:scale(.98);
}

#message{
    text-align:center;
    color:green;
    margin-top:10px;
}
</style>

</head>

<body>

<h1>📱 Rノート</h1>
<p id="today"></p>

<div class="card">

<p>⚖️ 体重 (kg)</p>

<input
id="weight"
type="number"
step="0.1"
placeholder="例：69.8">

</div>

<div class="card">

<p>🍙 朝食</p>

<textarea
id="breakfast"
placeholder="朝食を入力"></textarea>

</div>

<div class="card">

<p>🍱 昼食</p>

<textarea
id="lunch"
placeholder="昼食を入力"></textarea>

</div>

<div class="card">

<p>🍛 夕食</p>

<textarea
id="dinner"
placeholder="夕食を入力"></textarea>

</div>

<button onclick="saveData()">
💾 保存
</button>

<p id="message"></p>

<script>

function saveData(){

localStorage.setItem("weight",
document.getElementById("weight").value);

localStorage.setItem("breakfast",
document.getElementById("breakfast").value);

localStorage.setItem("lunch",
document.getElementById("lunch").value);

localStorage.setItem("dinner",
document.getElementById("dinner").value);

document.getElementById("message").innerHTML="✅ 保存しました！";

setTimeout(function(){
const today = new Date();

const dateText =
"📅 " +
today.getFullYear() + "年" +
(today.getMonth()+1) + "月" +
today.getDate() + "日";

document.getElementById("today").innerHTML = dateText;

document.getElementById("message").innerHTML="";

},1500);

}

window.onload=function(){

document.getElementById("weight").value=
localStorage.getItem("weight") || "";

document.getElementById("breakfast").value=
localStorage.getItem("breakfast") || "";

document.getElementById("lunch").value=
localStorage.getItem("lunch") || "";

document.getElementById("dinner").value=
localStorage.getItem("dinner") || "";

}

</script>

</body>
</html>
